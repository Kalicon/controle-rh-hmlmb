<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${funcionario.id == null ? 'Novo Funcionário' : 'Editar Funcionário'}"></title>
</head>
<body>
    <section>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">
                            <i th:class="${funcionario.id == null ? 'fas fa-user-plus me-2' : 'fas fa-user-edit me-2'}"></i>
                            <span th:text="${funcionario.id == null ? 'Cadastro de Novo Funcionário' : 'Edição de Funcionário'}"></span>
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/funcionarios}" th:object="${funcionario}" method="post" class="row g-3">
                            <input type="hidden" th:field="*{id}" />

                            <div class="col-md-12">
                                <label for="nome" class="form-label fw-bold">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" th:field="*{nome}" required placeholder="Ex: João da Silva">
                            </div>

                            <div class="col-md-6">
                                <label for="rs" class="form-label fw-bold">Número RS</label>
                                <input type="text" class="form-control" id="rs" th:field="*{rs}" required placeholder="Ex: 1234567">
                            </div>

                            <div class="col-md-6">
                                <label for="pv" class="form-label fw-bold">PV</label>
                                <input type="number" class="form-control" id="pv" th:field="*{pv}" required placeholder="Ex: 1">
                            </div>

                            <div class="col-md-6">
                                <label for="cargo" class="form-label fw-bold">Cargo</label>
                                <input type="text" class="form-control" id="cargo" th:field="*{cargo}" required placeholder="Ex: Analista">
                            </div>

                            <div class="col-md-6">
                                <label for="regimeJuridico" class="form-label fw-bold">Regime Jurídico</label>
                                <select class="form-select" id="regimeJuridico" th:field="*{regimeJuridico}" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="Estatutário">Estatutário</option>
                                    <option value="CLT">CLT</option>
                                    <option value="Comissionado">Comissionado</option>
                                </select>
                            </div>

                            <div class="col-12 mt-4 text-end">
                                <a href="/funcionarios/lista" class="btn btn-light border shadow-sm me-2">
                                    <i class="fas fa-times me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary shadow-sm px-4">
                                    <i class="fas fa-save me-1"></i> Salvar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
