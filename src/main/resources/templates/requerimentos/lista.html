<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base/head :: head('Requerimentos')}"></head>

<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container-fluid">
    <div class="row">
        <nav th:replace="~{fragments/menu :: menu}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Gestão de Requerimentos</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/requerimentos/formulario}" class="btn btn-primary">
                        <span data-feather="plus"></span>
                        Novo Requerimento
                    </a>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <span data-feather="filter"></span>
                    Filtros
                </div>
                <div class="card-body">
                    <form th:action="@{/requerimentos/lista}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <label for="ano" class="form-label">Exercício</label>
                            <input type="number" class="form-control" id="ano" name="ano" th:value="${exercicioAtual}" placeholder="Ano do Exercício">
                        </div>
                        <div class="col-md-4">
                            <label for="mes" class="form-label">Mês</label>
                            <select id="mes" name="mes" class="form-select">
                                <option value="">Todos os meses</option>
                                <option th:each="m : ${#numbers.sequence(1, 12)}"
                                        th:value="${m}"
                                        th:text="${T(java.time.Month).of(m).getDisplayName(T(java.time.format.TextStyle).FULL, new java.util.Locale('pt', 'BR'))}"
                                        th:selected="${mesAtual != null and mesAtual == m}"></option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-secondary w-100">
                                <span data-feather="search"></span>
                                Buscar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    Requerimentos Encontrados
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table id="requerimentosTable" class="table table-hover table-sm align-middle">
                            <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Servidor</th>
                                <th scope="col">Cargo</th>
                                <th scope="col">Início</th>
                                <th scope="col">Fim</th>
                                <th scope="col">Exercício</th>
                                <th scope="col" class="text-center no-sort">Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="req : ${requerimentos}">
                                <th scope="row" th:text="${req.id}"></th>
                                <td th:text="${req.nome}"></td>
                                <td th:text="${req.cargo}"></td>
                                <td th:text="${req.dataInicio != null ? #temporals.format(req.dataInicio, 'dd/MM/yyyy') : ''}"></td>
                                <td th:text="${req.dataTermino != null ? #temporals.format(req.dataTermino, 'dd/MM/yyyy') : ''}"></td>
                                <td th:text="${req.exercicio}"></td>
                                <td class="text-center">
                                    <a th:href="@{/requerimentos/editar/{id}(id=${req.id})}" class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <span data-feather="edit-2"></span>
                                    </a>
                                    <a th:href="@{/requerimentos/deletar/{id}(id=${req.id})}" class="btn btn-sm btn-outline-danger" title="Deletar"
                                       onclick="return confirm('Tem certeza que deseja deletar este requerimento?');">
                                        <span data-feather="trash-2"></span>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<div th:replace="~{fragments/base/footer :: footer}"></div>

<script>
    $(document).ready(function() {
        $('#requerimentosTable').DataTable({
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
            },
            "columnDefs": [
                { "orderable": false, "targets": "no-sort" }
            ]
        });
    });
</script>

</body>
</html>
