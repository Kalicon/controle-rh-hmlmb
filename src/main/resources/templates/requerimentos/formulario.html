<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base/head :: head('Novo Requerimento')}"></head>

<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container-fluid">
    <div class="row">
        <nav th:replace="~{fragments/menu :: menu}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">

            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Novo Requerimento</h1>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <span data-feather="upload-cloud"></span>
                    Passo 1: Extrair dados de PDF (Opcional)
                </div>
                <div class="card-body">
                    <p class="card-text">Selecione um arquivo PDF de requerimento para preencher os campos automaticamente.</p>
                    <div class="input-group">
                        <input type="file" class="form-control" id="pdfFile" accept=".pdf">
                        <button class="btn btn-secondary" type="button" id="uploadButton">
                            <span data-feather="send"></span>
                            Enviar PDF
                        </button>
                    </div>
                    <div id="uploadStatus" class="mt-3"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span data-feather="edit"></span>
                    Passo 2: Detalhes do Requerimento
                </div>
                <div class="card-body">
                    <form th:action="@{/requerimentos}" th:object="${requerimento}" method="post" id="requerimentoForm">
                        <p class="card-text">Preencha ou ajuste os campos abaixo e salve.</p>

                        <datalist id="servidoresList"></datalist>

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label for="nomeServidor" class="form-label">Nome do Servidor</label>
                                <input type="text" class="form-control" id="nomeServidor" th:field="*{nomeServidor}" list="servidoresList" autocomplete="off">
                            </div>
                            <div class="col-md-4">
                                <label for="rs" class="form-label">RS</label>
                                <input type="text" class="form-control" id="rs" th:field="*{rs}">
                            </div>
                            <div class="col-md-6">
                                <label for="cargo" class="form-label">Cargo</label>
                                <input type="text" class="form-control" id="cargo" th:field="*{cargo}">
                            </div>
                            <div class="col-md-3">
                                <label for="pv" class="form-label">PV</label>
                                <input type="text" class="form-control" id="pv" th:field="*{pv}">
                            </div>
                            <div class="col-md-3">
                                <label for="regimeJuridico" class="form-label">Regime Jurídico</label>
                                <input type="text" class="form-control" id="regimeJuridico" th:field="*{regimeJuridico}">
                            </div>
                            <div class="col-md-6">
                                <label for="tipoRequerimento" class="form-label">Tipo de Requerimento</label>
                                <input type="text" class="form-control" id="tipoRequerimento" th:field="*{tipoRequerimento}">
                            </div>
                            <div class="col-md-6">
                                <label for="exercicio" class="form-label">Exercício</label>
                                <input type="number" class="form-control" id="exercicio" th:field="*{exercicio}">
                            </div>
                            <div class="col-md-6">
                                <label for="dataInicio" class="form-label">Data de Início</label>
                                <input type="date" class="form-control" id="dataInicio" th:field="*{dataInicio}">
                            </div>
                            <div class="col-md-6">
                                <label for="dataFim" class="form-label">Data de Fim</label>
                                <input type="date" class="form-control" id="dataFim" th:field="*{dataFim}">
                            </div>
                            <div class="col-12">
                                <label for="observacao" class="form-label">Observação</label>
                                <textarea class="form-control" id="observacao" th:field="*{observacao}" rows="3"></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end">
                            <a th:href="@{/requerimentos}" class="btn btn-outline-secondary me-2">
                                <span data-feather="x"></span>
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <span data-feather="save"></span>
                                Salvar Requerimento
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

<div th:replace="~{fragments/base/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const uploadButton = document.getElementById('uploadButton');
        const pdfFile = document.getElementById('pdfFile');
        const uploadStatus = document.getElementById('uploadStatus');
        const form = document.getElementById('requerimentoForm');

        uploadButton.addEventListener('click', function () {
            if (pdfFile.files.length === 0) {
                uploadStatus.innerHTML = '<div class="alert alert-warning">Por favor, selecione um arquivo.</div>';
                return;
            }

            const formData = new FormData();
            formData.append('pdfFile', pdfFile.files[0]);

            uploadStatus.innerHTML = `<div class="alert alert-info d-flex align-items-center" role="alert">
                                        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                        <span>Enviando e processando o arquivo...</span>
                                      </div>`;

            fetch('/requerimentos/upload-pdf', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.erro || 'Falha no upload.'); });
                }
                return response.json();
            })
            .then(data => {
                uploadStatus.innerHTML = '<div class="alert alert-success">Dados extraídos com sucesso!</div>';

                Object.keys(data).forEach(key => {
                    const input = document.getElementById(key);
                    if (input) {
                        input.value = data[key] || '';
                    }
                });
            })
            .catch(error => {
                uploadStatus.innerHTML = `<div class="alert alert-danger">Erro: ${error.message}</div>`;
            });
        });

        const nomeServidorInput = document.getElementById('nomeServidor');
        const servidoresDatalist = document.getElementById('servidoresList');
        let servidoresData = [];

        fetch('/requerimentos/api/servidores')
            .then(response => response.json())
            .then(data => {
                servidoresData = data;
                data.forEach(servidor => {
                    const option = document.createElement('option');
                    option.value = servidor.nome;
                    servidoresDatalist.appendChild(option);
                });
            });

        nomeServidorInput.addEventListener('input', function(e) {
            const selectedNome = e.target.value;
            const selectedServidor = servidoresData.find(s => s.nome === selectedNome);

            if (selectedServidor) {
                document.getElementById('cargo').value = selectedServidor.cargo || '';
                document.getElementById('rs').value = selectedServidor.rs || '';
                document.getElementById('pv').value = selectedServidor.pv || '';
                document.getElementById('regimeJuridico').value = selectedServidor.regimeJuridico || '';
            }
        });
    });
</script>

</body>
</html>
