<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${requerimento.id == null ? 'Novo Requerimento' : 'Editar Requerimento'}"></title>
</head>
<body>
    <section>
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="card shadow-sm border-0 mb-4" th:if="${requerimento.id == null}">
                    <div class="card-header bg-white py-3 d-flex align-items-center">
                        <i class="fas fa-magic text-warning me-2"></i>
                        <h6 class="m-0 font-weight-bold text-dark">Preenchimento Inteligente (Upload de PDF)</h6>
                    </div>
                    <div class="card-body p-4 bg-light">
                        <p class="text-muted small mb-3">Selecione o arquivo PDF do requerimento para que o sistema extraia os dados e preencha o formulário abaixo automaticamente.</p>
                        <div class="input-group mb-2 shadow-sm">
                            <input type="file" class="form-control" id="pdfFile" accept=".pdf">
                            <button class="btn btn-warning fw-bold text-dark px-4" type="button" id="uploadButton">
                                <i class="fas fa-file-import me-1"></i> Extrair Dados
                            </button>
                        </div>
                        <div id="uploadStatus"></div>
                    </div>
                </div>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">
                            <i th:class="${requerimento.id == null ? 'fas fa-file-signature me-2' : 'fas fa-edit me-2'}"></i>
                            <span th:text="${requerimento.id == null ? 'Dados do Requerimento' : 'Edição de Requerimento'}"></span>
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/requerimentos}" th:object="${requerimento}" method="post" id="requerimentoForm" class="row g-3">
                            <input type="hidden" th:field="*{id}" />

                            <datalist id="servidoresList"></datalist>

                            <div class="col-md-12">
                                <label for="nome" class="form-label fw-bold text-secondary">Servidor Requerente</label>
                                <input type="text" class="form-control form-control-lg" id="nome" th:field="*{nome}" list="servidoresList" autocomplete="off" required placeholder="Digite o nome para buscar...">
                            </div>

                            <div class="col-md-4">
                                <label for="rs" class="form-label fw-bold">Número RS</label>
                                <input type="text" class="form-control" id="rs" th:field="*{rs}" placeholder="Ex: 1234567">
                            </div>

                            <div class="col-md-4">
                                <label for="cargo" class="form-label fw-bold">Cargo</label>
                                <input type="text" class="form-control" id="cargo" th:field="*{cargo}">
                            </div>

                            <div class="col-md-2">
                                <label for="pv" class="form-label fw-bold">PV</label>
                                <input type="number" class="form-control" id="pv" th:field="*{pv}">
                            </div>

                            <div class="col-md-2">
                                <label for="regimeJuridico" class="form-label fw-bold">Regime</label>
                                <input type="text" class="form-control" id="regimeJuridico" th:field="*{regimeJuridico}">
                            </div>

                            <hr class="my-4 text-muted">

                            <div class="col-md-3">
                                <label for="exercicio" class="form-label fw-bold">Exercício (Ano)</label>
                                <input type="number" class="form-control" id="exercicio" th:field="*{exercicio}" required>
                            </div>

                            <div class="col-md-3">
                                <label for="quantidadeDias" class="form-label fw-bold">Qtd. Dias</label>
                                <input type="number" class="form-control" id="quantidadeDias" th:field="*{quantidadeDias}" placeholder="Ex: 30">
                            </div>

                            <div class="col-md-3">
                                <label for="dataInicio" class="form-label fw-bold">Data de Início</label>
                                <input type="date" class="form-control" id="dataInicio" th:field="*{dataInicio}">
                            </div>

                            <div class="col-md-3">
                                <label for="dataEntrada" class="form-label fw-bold">Data de Entrada</label>
                                <input type="date" class="form-control" id="dataEntrada" th:field="*{dataEntrada}">
                            </div>

                            <div class="col-12 mt-3">
                                <label for="observacoes" class="form-label fw-bold">Observações / Detalhes</label>
                                <textarea class="form-control" id="observacoes" th:field="*{observacoes}" rows="3" placeholder="Detalhes adicionais sobre o requerimento..."></textarea>
                            </div>

                            <div class="col-12 mt-4 text-end">
                                <a th:href="@{/requerimentos/lista}" class="btn btn-light border shadow-sm me-2">
                                    <i class="fas fa-times me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary shadow-sm px-4">
                                    <i class="fas fa-save me-1"></i> Salvar Requerimento
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const uploadButton = document.getElementById('uploadButton');
            if(uploadButton) {
                const pdfFile = document.getElementById('pdfFile');
                const uploadStatus = document.getElementById('uploadStatus');

                uploadButton.addEventListener('click', function () {
                    if (pdfFile.files.length === 0) {
                        uploadStatus.innerHTML = '<div class="alert alert-warning mt-2 mb-0 py-2"><i class="fas fa-exclamation-triangle me-2"></i>Por favor, selecione um arquivo.</div>';
                        return;
                    }

                    const formData = new FormData();
                    formData.append('pdfFile', pdfFile.files[0]);

                    uploadStatus.innerHTML = `<div class="alert alert-info mt-2 mb-0 py-2 d-flex align-items-center" role="alert">
                                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                                <span>Enviando e processando o arquivo via IA...</span>
                                              </div>`;

                    fetch('/requerimentos/upload-pdf', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => {
                        if (!response.ok) {
                            return response.json().then(err => { throw new Error(err.erro || 'Falha no processamento.'); });
                        }
                        return response.json();
                    })
                    .then(data => {
                        uploadStatus.innerHTML = '<div class="alert alert-success mt-2 mb-0 py-2"><i class="fas fa-check-circle me-2"></i>Dados extraídos com sucesso! Revise os campos abaixo.</div>';

                        Object.keys(data).forEach(key => {
                            const input = document.getElementById(key);
                            if (input) {
                                input.value = data[key] || '';
                            }
                        });
                    })
                    .catch(error => {
                        uploadStatus.innerHTML = `<div class="alert alert-danger mt-2 mb-0 py-2"><i class="fas fa-times-circle me-2"></i>Erro: ${error.message}</div>`;
                    });
                });
            }

            const nomeInput = document.getElementById('nome');
            const servidoresDatalist = document.getElementById('servidoresList');
            let servidoresData = [];

            fetch('/requerimentos/api/servidores')
                .then(response => response.json())
                .then(data => {
                    servidoresData = data;
                    data.forEach(servidor => {
                        const option = document.createElement('option');
                        option.value = servidor.nome;
                        servidoresDatalist.appendChild(option);
                    });
                });

            nomeInput.addEventListener('input', function(e) {
                const selectedNome = e.target.value;
                const selectedServidor = servidoresData.find(s => s.nome === selectedNome);

                if (selectedServidor) {
                    document.getElementById('cargo').value = selectedServidor.cargo || '';
                    document.getElementById('rs').value = selectedServidor.rs || '';
                    document.getElementById('pv').value = selectedServidor.pv || '';
                    document.getElementById('regimeJuridico').value = selectedServidor.regimeJuridico || '';
                }
            });
        });
    </script>
</body>
</html>
