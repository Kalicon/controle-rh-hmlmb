<nav th:fragment="sidebar" class="sidebar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="sidebar-header">
        <h3><i class="fas fa-building me-2"></i>Controle RH</h3>
    </div>

    <ul class="list-unstyled components">
        <li th:class="${activePage == 'dashboard' ? 'active' : ''}">
            <a href="/">
                <i class="fas fa-home fa-fw"></i> Dashboard
            </a>
        </li>

        <li sec:authorize="hasRole('MASTER')" th:class="${activePage == 'users' ? 'active' : ''}">
            <a href="/user-management">
                <i class="fas fa-users-cog fa-fw"></i> Usuários
            </a>
        </li>

        <li>
            <a href="#funcionariosSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                <i class="fas fa-user-tie fa-fw"></i> Funcionários
            </a>
            <ul class="collapse list-unstyled" id="funcionariosSubmenu" th:classappend="${#strings.startsWith(activePage ?: '', 'func_') ? 'show' : ''}">
                <li th:class="${activePage == 'func_lista' ? 'active' : ''}">
                    <a href="/funcionarios/lista"><i class="fas fa-list fa-fw"></i> Lista de Funcionários</a>
                </li>
                <li th:class="${activePage == 'func_form' ? 'active' : ''}">
                    <a href="/funcionarios/formulario"><i class="fas fa-user-plus fa-fw"></i> Novo Funcionário</a>
                </li>
            </ul>
        </li>

        <li>
            <a href="#requerimentosSubmenu" data-bs-toggle="collapse" aria-expanded="false" class="dropdown-toggle">
                <i class="fas fa-file-alt fa-fw"></i> Requerimentos
            </a>
            <ul class="collapse list-unstyled" id="requerimentosSubmenu" th:classappend="${#strings.startsWith(activePage ?: '', 'req_') ? 'show' : ''}">
                <li th:class="${activePage == 'req_lista' ? 'active' : ''}">
                    <a href="/requerimentos/lista"><i class="fas fa-list fa-fw"></i> Lista de Requerimentos</a>
                </li>
                <li th:class="${activePage == 'req_form' ? 'active' : ''}">
                    <a href="/requerimentos/formulario"><i class="fas fa-plus-circle fa-fw"></i> Novo Requerimento</a>
                </li>
            </ul>
        </li>
    </ul>

    <div class="sidebar-footer mt-auto" sec:authorize="isAuthenticated()">
        <div class="user-info text-center mb-3">
            <i class="fas fa-user-circle fa-2x mb-2 text-primary"></i><br/>
            <span class="fw-bold" sec:authentication="name"></span><br/>
            <small class="text-muted" sec:authentication="principal.authorities">Roles</small>
        </div>
        <form th:action="@{/logout}" method="post" class="px-3 pb-3">
            <button type="submit" class="btn btn-outline-danger w-100">
                <i class="fas fa-sign-out-alt"></i> Sair do Sistema
            </button>
        </form>
    </div>
</nav>
