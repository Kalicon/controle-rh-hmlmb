<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, scripts)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de RH - HMLMB</title>

    <!-- TEMA BOOTSTRAP "LITERA" -->
    <link href="https://bootswatch.com/5/litera/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; font-size: .9rem; }
        .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; padding: 56px 0 0; box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1); }
        .navbar { z-index: 101; }
        .nav-link.active { font-weight: 500; }
        .feather { width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 5px; }
        .table-hover tbody tr:hover { background-color: rgba(0,0,0,.04); cursor: pointer; }
        .card { border: 1px solid rgba(0,0,0,.125); }
        .dataTables_wrapper .row:first-child { padding-bottom: 1rem; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container-fluid">
    <div class="row">
        <nav th:replace="~{fragments/menu :: menu}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <!-- Conteúdo da página injetado aqui -->
            <th:block th:replace="${content}"></th:block>
        </main>
    </div>
</div>

<!-- JS Core do Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- JS do Feather Icons -->
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<!-- JS do JQuery (necessário para o DataTables) -->
<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<!-- JS do DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    // Inicializa os ícones em toda a aplicação
    feather.replace();
</script>

<!-- Bloco para scripts específicos da página (opcional) -->
<th:block th:replace="${scripts} ?: ~{}"></th:block>

</body>
</html>
